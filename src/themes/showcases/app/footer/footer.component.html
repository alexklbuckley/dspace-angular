<footer id="showcase_footer" class="pt-3 pb-2">
  <div class="container">
  <div class="d-flex flex-row justify-content-between">
    <div class="showcase_footer_elements" id="showcase_footer_owner">
      <ng-container *ngIf="showcaseCollection; else placeholderShowcaseOwner">
        <p>{{ this.collectionService.sanitizeCustomText(showcaseCollection.customOwnerNameText) }}</p>
      </ng-container>
      <ng-template #placeholderShowcaseOwner>
        <p>Tuwhera Showcase</p>
      </ng-template>
    </div>
    <div class="showcase_footer_elements" id="showcase_footer_info">
      <div id="showcase_footer_contact">
        <ng-container *ngIf="showcaseCollection">
          <div [innerHTML]="this.collectionService.sanitizeCustomText(showcaseCollection.customFooterText)"></div>
        </ng-container>
      </div>
    </div>
  </div>
  <div class="d-flex flex-row justify-content-between">
    <div id="showcase_footer_tagline">
      Tuwhera showcases are an initiative of Te Mātāpuna Library and Learning Services, AUT. <a href="https://tuwhera.aut.ac.nz" target="_blank">Find out more</a>
    </div>
    <div id="showcase_footer_auth">
      <ds-themed-auth-nav-menu></ds-themed-auth-nav-menu>
    </div>
  </div>
  </div>
</footer>
